<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>snip — URL Shortener</title>
<link rel="icon" type="png/x-icon" href="{{ url_for('static', filename='logo.png')}}">
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:    #0a0a0f;
    --panel: #13131c;
    --border:#1e1e2e;
    --ink:   #e8e8f0;
    --muted: #6b6b80;
    --accent:#7c6af7;
    --green: #4ade80;
    --red:   #f87171;
    --glow:  rgba(124,106,247,.35);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Syne',sans-serif;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:60px 20px 80px;
    background-image:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(124,106,247,.18) 0%, transparent 70%);
  }

  /* ── Header ── */
  header{text-align:center;margin-bottom:52px;animation:fadeUp .6s ease both}
  .logo{
    font-size:clamp(2.8rem,8vw,5rem);
    font-weight:800;
    letter-spacing:-2px;
    background:linear-gradient(135deg,#fff 30%,var(--accent));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
  }
  .tagline{color:var(--muted);font-size:.95rem;margin-top:8px;letter-spacing:.04em}

  /* ── Card ── */
  .card{
    width:100%;max-width:620px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:18px;
    padding:36px 32px;
    box-shadow:0 0 60px rgba(0,0,0,.5);
    animation:fadeUp .6s .1s ease both;
  }

  label{display:block;font-size:.78rem;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;margin-bottom:8px}

  .input-wrap{position:relative;margin-bottom:20px}
  input[type=text]{
    width:100%;background:#0d0d16;
    border:1.5px solid var(--border);
    border-radius:10px;
    color:var(--ink);
    font-family:'DM Mono',monospace;
    font-size:.95rem;
    padding:14px 16px;
    outline:none;
    transition:border-color .2s,box-shadow .2s;
  }
  input[type=text]::placeholder{color:var(--muted)}
  input[type=text]:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--glow)}

  .prefix{
    position:absolute;left:14px;top:50%;transform:translateY(-50%);
    color:var(--accent);font-family:'DM Mono',monospace;font-size:.9rem;
    pointer-events:none;
  }
  #custom-input{padding-left:90px}

  .row{display:flex;gap:12px;align-items:flex-end;margin-bottom:24px}
  .row .input-wrap{flex:1;margin-bottom:0}

  button{
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:10px;
    font-family:'Syne',sans-serif;
    font-weight:700;
    font-size:.95rem;
    padding:14px 28px;
    cursor:pointer;
    transition:opacity .15s,transform .1s,box-shadow .2s;
    white-space:nowrap;
  }
  button:hover{opacity:.9;box-shadow:0 0 18px var(--glow)}
  button:active{transform:scale(.97)}
  button:disabled{opacity:.4;cursor:not-allowed}

  /* ── Result ── */
  #result{
    margin-top:24px;
    border-radius:12px;
    overflow:hidden;
    display:none;
  }
  .result-box{
    background:#0d1a14;
    border:1.5px solid #1a3a28;
    border-radius:12px;
    padding:18px 20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:14px;
  }
  .result-url{
    font-family:'DM Mono',monospace;
    font-size:.95rem;
    color:var(--green);
    word-break:break-all;
  }
  .copy-btn{
    background:transparent;
    border:1.5px solid #1a3a28;
    color:var(--green);
    font-size:.8rem;
    padding:8px 14px;
    border-radius:8px;
    flex-shrink:0;
  }
  .copy-btn:hover{background:#1a3a28;box-shadow:none}

  .error-box{
    background:#1a0f0f;
    border:1.5px solid #3a1a1a;
    border-radius:12px;
    padding:16px 20px;
    color:var(--red);
    font-size:.9rem;
  }

  /* ── Recent ── */
  .recent{
    width:100%;max-width:620px;
    margin-top:32px;
    animation:fadeUp .6s .2s ease both;
  }
  .recent-title{
    font-size:.78rem;font-weight:700;letter-spacing:.1em;
    color:var(--muted);text-transform:uppercase;margin-bottom:14px;
  }
  .recent-list{display:flex;flex-direction:column;gap:8px}
  .recent-item{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:10px;
    padding:12px 16px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
    font-size:.85rem;
    transition:border-color .2s;
  }
  .recent-item:hover{border-color:var(--accent)}
  .recent-short{
    font-family:'DM Mono',monospace;color:var(--accent);
    text-decoration:none;font-weight:500;white-space:nowrap;
  }
  .recent-orig{
    color:var(--muted);overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap;flex:1;
    font-family:'DM Mono',monospace;font-size:.8rem;
  }
  .recent-clicks{
    color:var(--muted);font-size:.78rem;white-space:nowrap;
  }

  /* ── Animations ── */
  @keyframes fadeUp{
    from{opacity:0;transform:translateY(18px)}
    to{opacity:1;transform:translateY(0)}
  }
  .spin{animation:spin .6s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<header>
  <div class="logo"><img src="{{ url_for('static', filename='logo.svg')}}" alt='logo' height="90px" style="height: 36px:auto;vertical-align: middle;">snip.</div>
  <p class="tagline">Shrink any link. Share it anywhere.</p>
</header>

<div class="card">
  <div class="input-wrap">
    <label for="long-url">Long URL</label>
    <input type="text" id="long-url" placeholder="https://example.com/very/long/url/goes/here"/>
  </div>

  <div class="row">
    <div class="input-wrap">
      <label for="custom-input">Custom alias <span style="color:var(--muted);font-weight:400">(optional)</span></label>
      <span class="prefix">snip/</span>
      <input type="text" id="custom-input" placeholder="my-link"/>
    </div>
    <button id="shorten-btn" onclick="shorten()">Shorten →</button>
  </div>

  <div id="result"></div>
</div>

<div class="recent">
  <div class="recent-title">Recent links</div>
  <div class="recent-list" id="recent-list">
    <div style="color:var(--muted);font-size:.85rem">Loading…</div>
  </div>
</div>

<script>
const BASE = window.location.origin;

async function shorten() {
  const url    = document.getElementById('long-url').value.trim();
  const custom = document.getElementById('custom-input').value.trim();
  const btn    = document.getElementById('shorten-btn');
  const res    = document.getElementById('result');

  if (!url) { showError('Please enter a URL first.'); return; }

  btn.disabled = true;
  btn.textContent = '…';
  res.style.display = 'none';

  try {
    const r = await fetch('/shorten', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ url, custom })
    });
    const data = await r.json();

    if (!r.ok) { showError(data.error || 'Something went wrong.'); return; }

    res.style.display = 'block';
    res.innerHTML = `
      <div class="result-box">
        <span class="result-url">${data.short_url}</span>
        <button class="copy-btn" onclick="copy('${data.short_url}', this)">Copy</button>
      </div>`;
    loadRecent();
  } catch(e) {
    showError('Network error. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Shorten →';
  }
}

function showError(msg) {
  const res = document.getElementById('result');
  res.style.display = 'block';
  res.innerHTML = `<div class="error-box">⚠ ${msg}</div>`;
}

function copy(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 2000);
  });
}

document.getElementById('long-url').addEventListener('keydown', e => {
  if (e.key === 'Enter') shorten();
});

async function loadRecent() {
  const list = document.getElementById('recent-list');
  try {
    const r = await fetch('/recent');
    const rows = await r.json();
    if (!rows.length) { list.innerHTML = '<div style="color:var(--muted);font-size:.85rem">No links yet.</div>'; return; }
    list.innerHTML = rows.map(row => {
      const short = `${BASE}/${row.short}`;
      return `
        <div class="recent-item">
          <a class="recent-short" href="${short}" target="_blank">/${row.short}</a>
          <span class="recent-orig">${row.original}</span>
          <span class="recent-clicks">${row.clicks} click${row.clicks !== 1 ? 's' : ''}</span>
        </div>`;
    }).join('');
  } catch(e) {
    list.innerHTML = '<div style="color:var(--muted);font-size:.85rem">Could not load recent links.</div>';
  }
}

loadRecent();
</script>
</body>
</html>
